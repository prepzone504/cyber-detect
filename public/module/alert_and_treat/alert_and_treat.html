<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts & Threats | CyberDetect</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-base: #FFFFFF; --bg-surface: #FFFFFF; --text-primary: #000000; --text-secondary: #555555; --border-color: #000000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; font-weight: 800 !important; }
        body { display: flex; height: 100vh; background: var(--bg-base); color: var(--text-primary); overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--bg-surface); border-right: 2px solid var(--border-color); display: flex; flex-direction: column; padding: 25px; z-index: 20; }
        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; text-decoration: none; color: black; }
        .brand-icon { width: 32px; height: 32px; background: #000000; border-radius: 8px; }
        .brand-name { font-family: 'Outfit', sans-serif; font-size: 1.5rem; }
        .nav-item { display: flex; align-items: center; padding: 12px 15px; color: var(--text-primary); text-decoration: none; margin-bottom: 8px; transition: all 0.3s; border: 2px solid transparent; }
        .nav-item:hover, .nav-item.active { background: #000000; color: #FFFFFF; }
        
        /* Main Area */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; position: relative; }
        .topbar { height: 75px; border-bottom: 2px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; background: #FFFFFF; position: sticky; top: 0; z-index: 10; }
        .content-area { padding: 40px; }
        
        /* Buttons */
        .btn { padding: 10px 20px; font-family: 'Inter', sans-serif; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; border: 2px solid #000000; }
        .btn-primary { background: #000000; color: #FFFFFF; box-shadow: 4px 4px 0px rgba(0, 0, 0, 1); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 6px 6px 0px rgba(0, 0, 0, 1); background: #FFF; color: #000; }
        
        /* Summary Strip */
        .summary-strip { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .summary-card { flex: 1; min-width: 150px; border: 2px solid #000; padding: 20px; background: #FFF; box-shadow: 6px 6px 0px rgba(0,0,0,1); text-align: center; }
        .summary-value { font-size: 2rem; font-family: 'Outfit', sans-serif; margin-bottom: 5px; }
        .summary-label { font-size: 0.85rem; text-transform: uppercase; }

        /* Filter Row */
        .filter-row { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; align-items: flex-end; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-label { font-size: 0.8rem; text-transform: uppercase; }
        .filter-input { padding: 8px 12px; border: 2px solid #000; background: #FFF; font-family: 'Inter', sans-serif; font-size: 0.9rem; }
        
        /* Table styles */
        .table-container { background: var(--bg-surface); border: 2px solid var(--border-color); box-shadow: 10px 10px 0px rgba(0,0,0,1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px 20px; background: #000; color: #FFF; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #000; }
        td { padding: 15px 20px; border-bottom: 2px solid var(--border-color); font-size: 0.95rem; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #F0F0F0; }
        
        /* Badges */
        .badge { padding: 6px 12px; font-size: 0.8rem; display: inline-block; text-align: center; border: 2px solid #000; text-transform: uppercase; }
        .badge.attack { background: #000; color: #FFF; }
        .badge.normal { background: #FFF; color: #000; }
        
        .status { padding: 6px 12px; display: inline-block; font-size: 0.8rem; border: 2px solid #000; text-transform: uppercase; }
        .status.blocked { background: #000; color: #FFF; }
        .status.allowed { background: #FFF; color: #000; }

        .pagination { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .pg-btn { padding: 8px 15px; border: 2px solid #000; background: #FFF; cursor: pointer; }
        .pg-btn.active { background: #000; color: #FFF; }
        .pg-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="../../index.html" class="brand"><div class="brand-icon"></div><span class="brand-name">CyberDetect</span></a>
        <nav>
            <a href="../dashboard/dashboard.html" class="nav-item">Dashboard</a>
            <a href="../real_time_montioring/real_time_montioring.html" class="nav-item">Real-Time Monitoring</a>
            <a href="../alert_and_treat/alert_and_treat.html" class="nav-item active">Alerts & Threats</a>
            <a href="../upload/upload.html" class="nav-item">Upload Logs</a>
        </nav>
        <div style="margin-top: auto;"><a href="#" id="signOutBtn" class="nav-item" style="border-color: #000; text-align: center; justify-content: center;">Sign Out</a></div>
    </div>
    
    <div class="main-content">
        <div class="topbar">
            <h2 style="font-family: 'Outfit', sans-serif;">Threats Directory & Logs</h2>
            <button class="btn btn-primary" onclick="exportCSV()">Export CSV Report</button>
        </div>
        
        <div class="content-area">

            <div class="summary-strip">
                <div class="summary-card">
                    <div class="summary-value" id="s-total">0</div>
                    <div class="summary-label">Total Events</div>
                </div>
                <div class="summary-card">
                    <div class="summary-value" id="s-threats">0</div>
                    <div class="summary-label">Threats Detected</div>
                </div>
                <div class="summary-card">
                    <div class="summary-value" id="s-blocked">0</div>
                    <div class="summary-label">Threats Blocked</div>
                </div>
                <div class="summary-card">
                    <div class="summary-value" id="s-normal">0</div>
                    <div class="summary-label">Normal Traffic</div>
                </div>
            </div>

            <div class="filter-row">
                <div class="filter-group">
                    <label class="filter-label">Search</label>
                    <input type="text" class="filter-input" id="search" placeholder="Search IP..." oninput="applyFilters()">
                </div>
                <div class="filter-group">
                    <label class="filter-label">Attack Type</label>
                    <select class="filter-input" id="f-type" onchange="applyFilters()">
                        <option value="all">All Types</option>
                        <option value="Normal">Normal</option>
                        <option value="DoS">DoS</option>
                        <option value="Probe">Probe</option>
                        <option value="R2L">R2L</option>
                        <option value="U2R">U2R</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Protocol</label>
                    <select class="filter-input" id="f-proto" onchange="applyFilters()">
                        <option value="all">All Protocols</option>
                        <option value="TCP">TCP</option>
                        <option value="UDP">UDP</option>
                        <option value="ICMP">ICMP</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Action</label>
                    <select class="filter-input" id="f-action" onchange="applyFilters()">
                        <option value="all">All Actions</option>
                        <option value="Blocked">Blocked</option>
                        <option value="Allowed">Allowed</option>
                    </select>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Source IP</th>
                            <th>Dest IP</th>
                            <th>Protocol</th>
                            <th>Threat Type</th>
                            <th>Confidence</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="report-tbody">
                        <tr><td colspan="7" style="text-align:center;">Loading logs...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>

        </div>
    </div>

    <script>
        // Supabase Initialization
        const _url = 'https://ysbfrcspxiytwpitpbbk.supabase.co';
        const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzYmZyY3NweGl5dHdwaXRwYmJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NjAwMTQsImV4cCI6MjA5ODEzNjAxNH0.w5Vz_JIva0Qysn5RlVdQAQhd8EGVc8P3d3BnJeHhOqY';
        const db = window.supabase.createClient(_url, _key);

        // Check Auth
        async function checkUser() {
            const { data: { session } } = await db.auth.getSession();
            if (!session) {
                const mockEmail = sessionStorage.getItem('auth_email');
                if(!mockEmail) window.location.href = '../auth/login.html';
            }
            loadData();
        }
        checkUser();

        document.getElementById('signOutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await db.auth.signOut();
            sessionStorage.clear();
            window.location.href = '../auth/login.html';
        });

        // State
        let allData = [];
        let filteredData = [];
        let currentPage = 1;
        const PAGE_SIZE = 15;

        async function loadData() {
            const { data, error } = await supabase
                .from('network_logs')
                .select('*')
                .order('timestamp', { ascending: false });
            
            if (error) {
                console.error(error);
                document.getElementById('report-tbody').innerHTML = `<tr><td colspan="7" style="text-align:center;color:red;">Error loading data: ${error.message}</td></tr>`;
                return;
            }

            allData = data || [];
            applyFilters();
        }

        function updateSummary(data) {
            const total = data.length;
            const threats = data.filter(r => r.prediction !== 'Normal').length;
            const blocked = data.filter(r => r.action === 'Blocked').length;
            const normal = total - threats;

            document.getElementById('s-total').textContent = total;
            document.getElementById('s-threats').textContent = threats;
            document.getElementById('s-blocked').textContent = blocked;
            document.getElementById('s-normal').textContent = normal;
        }

        function applyFilters() {
            const q = document.getElementById('search').value.toLowerCase();
            const type = document.getElementById('f-type').value;
            const proto = document.getElementById('f-proto').value;
            const action = document.getElementById('f-action').value;

            filteredData = allData.filter(r => {
                if (type !== 'all' && r.prediction !== type) return false;
                if (proto !== 'all' && r.protocol !== proto) return false;
                if (action !== 'all' && r.action !== action) return false;
                if (q && !r.source_ip.includes(q) && !r.dest_ip.includes(q) && !r.prediction.toLowerCase().includes(q)) return false;
                return true;
            });

            currentPage = 1;
            updateSummary(filteredData);
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('report-tbody');
            const start = (currentPage - 1) * PAGE_SIZE;
            const pageData = filteredData.slice(start, start + PAGE_SIZE);

            if (pageData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;">No records found.</td></tr>`;
            } else {
                tbody.innerHTML = pageData.map(r => {
                    const badge = r.prediction === 'Normal' ? 'normal' : 'attack';
                    const status = r.action === 'Blocked' ? 'blocked' : 'allowed';
                    const ts = new Date(r.timestamp).toLocaleString();
                    return `
                        <tr>
                            <td>${ts}</td>
                            <td>${r.source_ip}</td>
                            <td>${r.dest_ip}</td>
                            <td>${r.protocol}</td>
                            <td><span class="badge ${badge}">${r.prediction}</span></td>
                            <td>${r.confidence || 95}%</td>
                            <td><span class="status ${status}">${r.action}</span></td>
                        </tr>
                    `;
                }).join('');
            }
            renderPagination();
        }

        function renderPagination() {
            const total = Math.ceil(filteredData.length / PAGE_SIZE);
            const pg = document.getElementById('pagination');
            pg.innerHTML = '';
            if (total <= 1) return;

            const mkBtn = (label, page, active, disabled) => {
                const b = document.createElement('button');
                b.className = 'pg-btn' + (active ? ' active' : '');
                b.textContent = label;
                if (disabled) b.disabled = true;
                if (!disabled && !active) b.onclick = () => { currentPage = page; renderTable(); };
                pg.appendChild(b);
            };

            mkBtn('<', currentPage - 1, false, currentPage === 1);
            let start = Math.max(1, currentPage - 2);
            let end = Math.min(total, start + 4);
            for (let p = start; p <= end; p++) {
                mkBtn(p, p, p === currentPage, false);
            }
            mkBtn('>', currentPage + 1, false, currentPage === total);
        }

        function exportCSV() {
            if (filteredData.length === 0) return alert('No data to export.');
            const headers = ['Timestamp', 'Source IP', 'Dest IP', 'Protocol', 'Prediction', 'Action', 'Confidence'];
            const rows = filteredData.map(r => [
                new Date(r.timestamp).toISOString(), r.source_ip, r.dest_ip, r.protocol, r.prediction, r.action, r.confidence
            ].join(','));
            
            const csv = [headers.join(','), ...rows].join('\n');
            const a = document.createElement('a');
            a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
            a.download = 'cyberdetect_report.csv';
            a.click();
        }
    </script>
</body>
</html>
